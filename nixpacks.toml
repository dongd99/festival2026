[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
    "cd frontend && npm ci",
    "pip install -r backend/requirements.txt"
]

[phases.build]
cmds = [
    "cd frontend && VITE_API_URL='' npm run build",
    "cp -r frontend/dist backend/dist"
]

[start]
cmd = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
